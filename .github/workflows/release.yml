name: Release Workflow

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "20"
      badges-branch:
        description: "Branch to push coverage badges to"
        required: false
        type: string
        default: "badges"
    secrets:
      DISCORD_WEBHOOK:
        required: true

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}
      new_release_notes: ${{ steps.release.outputs.new_release_notes }}
      new_release_url: ${{ steps.release.outputs.new_release_url }}
      coverage: ${{ steps.coverage.outputs.percentage }}
      coverage-delta: ${{ steps.coverage.outputs.delta }}
      coverage-emoji: ${{ steps.coverage.outputs.emoji }}
      coverage-color: ${{ steps.coverage.outputs.color }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Release Action
        id: release
        uses: techflouu/.github/.github/actions/release@main
        with:
          node-version: ${{ inputs.node-version }}

      # --- Coverage Badge ---

      - name: Download coverage from PR check
        id: download-coverage
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: pr-check.yml
          name: coverage-report
          path: ./coverage
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Fetch previous coverage
        id: prev-coverage
        run: |
          PREV="0"
          if git fetch origin ${{ inputs.badges-branch }} 2>/dev/null; then
            PREV_SVG=$(git show origin/${{ inputs.badges-branch }}:coverage-badge.svg 2>/dev/null || echo "")
            if [ -n "$PREV_SVG" ]; then
              PREV=$(echo "$PREV_SVG" | grep -oP '(?<=coverage: )\d+\.?\d*' | head -1 || echo "0")
            fi
          fi
          echo "percentage=${PREV}" >> $GITHUB_OUTPUT

      - name: Extract coverage
        id: coverage
        run: |
          if [ ! -f ./coverage/coverage-summary.json ]; then
            echo "percentage=N/A" >> $GITHUB_OUTPUT
            echo "delta=N/A" >> $GITHUB_OUTPUT
            echo "emoji=❓" >> $GITHUB_OUTPUT
            echo "color=9f9f9f" >> $GITHUB_OUTPUT
            exit 0
          fi

          COVERAGE=$(node -e "
            const summary = require('./coverage/coverage-summary.json');
            console.log(summary.total.statements.pct);
          ")
          echo "percentage=${COVERAGE}" >> $GITHUB_OUTPUT

          PREV="${{ steps.prev-coverage.outputs.percentage }}"
          DELTA=$(echo "$COVERAGE - $PREV" | bc -l)
          if (( $(echo "$DELTA > 0" | bc -l) )); then
            echo "delta=+${DELTA}" >> $GITHUB_OUTPUT
            echo "emoji=📈" >> $GITHUB_OUTPUT
          elif (( $(echo "$DELTA < 0" | bc -l) )); then
            echo "delta=${DELTA}" >> $GITHUB_OUTPUT
            echo "emoji=📉" >> $GITHUB_OUTPUT
          else
            echo "delta=0" >> $GITHUB_OUTPUT
            echo "emoji=➡️" >> $GITHUB_OUTPUT
          fi

          COLOR="e05d44"
          if (( $(echo "$COVERAGE >= 80" | bc -l) )); then COLOR="44cc11"
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then COLOR="97ca00"
          elif (( $(echo "$COVERAGE >= 40" | bc -l) )); then COLOR="dfb317"
          elif (( $(echo "$COVERAGE >= 20" | bc -l) )); then COLOR="fe7d37"
          fi
          echo "color=${COLOR}" >> $GITHUB_OUTPUT

      - name: Update coverage badge
        if: steps.coverage.outputs.percentage != 'N/A'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PERCENTAGE="${{ steps.coverage.outputs.percentage }}"
          COLOR="${{ steps.coverage.outputs.color }}"

          LABEL="coverage"
          MESSAGE="${PERCENTAGE}%"
          LABEL_WIDTH=63
          MSG_LEN=${#MESSAGE}
          MSG_WIDTH=$((MSG_LEN * 7 + 10))
          TOTAL_WIDTH=$((LABEL_WIDTH + MSG_WIDTH))
          LABEL_X=$((LABEL_WIDTH * 5))
          MSG_X=$((LABEL_WIDTH * 10 + MSG_WIDTH * 5))

          cat > /tmp/coverage-badge.svg << SVGEOF
          <svg xmlns="http://www.w3.org/2000/svg" width="${TOTAL_WIDTH}" height="20" role="img" aria-label="${LABEL}: ${MESSAGE}">
            <title>${LABEL}: ${MESSAGE}</title>
            <linearGradient id="s" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
              <stop offset="1" stop-opacity=".1"/>
            </linearGradient>
            <clipPath id="r">
              <rect width="${TOTAL_WIDTH}" height="20" rx="3" fill="#fff"/>
            </clipPath>
            <g clip-path="url(#r)">
              <rect width="${LABEL_WIDTH}" height="20" fill="#555"/>
              <rect x="${LABEL_WIDTH}" width="${MSG_WIDTH}" height="20" fill="#${COLOR}"/>
              <rect width="${TOTAL_WIDTH}" height="20" fill="url(#s)"/>
            </g>
            <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110">
              <text aria-hidden="true" x="${LABEL_X}" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="$((LABEL_WIDTH * 10 - 100))">${LABEL}</text>
              <text x="${LABEL_X}" y="140" transform="scale(.1)" fill="#fff" textLength="$((LABEL_WIDTH * 10 - 100))">${LABEL}</text>
              <text aria-hidden="true" x="${MSG_X}" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="$((MSG_WIDTH * 10 - 100))">${MESSAGE}</text>
              <text x="${MSG_X}" y="140" transform="scale(.1)" fill="#fff" textLength="$((MSG_WIDTH * 10 - 100))">${MESSAGE}</text>
            </g>
          </svg>
          SVGEOF

          cd /tmp
          rm -rf badge-repo
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git badge-repo
          cd badge-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin ${{ inputs.badges-branch }} 2>/dev/null && git checkout ${{ inputs.badges-branch }} || git checkout --orphan ${{ inputs.badges-branch }}
          git rm -rf . 2>/dev/null || true
          cp /tmp/coverage-badge.svg coverage-badge.svg
          cp $GITHUB_WORKSPACE/coverage/coverage-summary.json coverage-summary.json || true
          git add coverage-badge.svg coverage-summary.json
          git commit -m "chore: update coverage badge to ${PERCENTAGE}% [skip ci]" || echo "No changes"
          git push origin ${{ inputs.badges-branch }} --force

      # --- Discord Notification ---

      - name: Discord Release Notification
        if: steps.release.outputs.new_release_published == 'true'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          nodetail: true
          title: "🚀 New Release Published!"
          description: |
            **Version:** `${{ steps.release.outputs.new_release_version }}`
            **Repository:** ${{ github.repository }}
            **Triggered by:** `@${{ github.actor }}`
            **Email:** `${{ github.event.pusher.email || github.event.head_commit.author.email || 'N/A' }}`

            ${{ steps.coverage.outputs.emoji }} **Coverage:** `${{ steps.coverage.outputs.percentage }}%` (${{ steps.coverage.outputs.delta }}%)

            📋 **Release Notes:**
            ${{ steps.release.outputs.new_release_notes }}

            🔗 [View Release](${{ steps.release.outputs.new_release_url }})
          color: 0x00ff00

      - name: Discord Release Failure Notification
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "❌ Release Failed"
          description: "Failed to create release for ${{ github.repository }}"
          color: 0xff0000
