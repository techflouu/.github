name: Shared Deploy Prepare

on:
  workflow_call:
    inputs:
      target-env:
        description: "Target environment (e.g., stg, prod)"
        required: true
        type: string
      ts-tag:
        description: "Tailscale ACL tag for the CI node"
        required: false
        type: string
        default: "ci-journey"
    outputs:
      version:
        description: "The version generated by release action"
        value: ${{ jobs.prepare-env.outputs.version }}
    secrets:
      TS_AUTHKEY:
        required: true
      VAULT_ADDR:
        required: true
      VAULT_ROLE:
        required: true

jobs:
  prepare-env:
    name: Prepare Environment
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Run Release Action
        id: release
        uses: techflouu/.github/.github/actions/release@main

      - name: Run Read Secrets Action
        id: read-secrets
        uses: techflouu/.github/.github/actions/read-secrets@main
        with:
          target: ${{ inputs.target-env }}
          release-tag: ${{ steps.release.outputs.version }}
          ts-oauth-secret: ${{ secrets.TS_AUTHKEY }}
          vault-addr: ${{ secrets.VAULT_ADDR }}
          vault-role: ${{ secrets.VAULT_ROLE }}
          ts-tag: ${{ inputs.ts-tag }}

      - name: Upload config files
        uses: actions/upload-artifact@v4
        with:
          name: config-files-${{ inputs.target-env }}
          path: ${{ steps.read-secrets.outputs.generated-config-path }}
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1
